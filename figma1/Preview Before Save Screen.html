<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview Before Save</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f4f6fb; color: #1f2937; }
    .app { width: 100%; max-width: 390px; min-height: 100vh; margin: 0 auto; background: #f4f6fb; }
    .header {
      height: 74px; background: #7890d8; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .back-btn {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      color: white; text-decoration: none; font-size: 34px;
    }
    .header-title { color: white; font-size: 22px; font-weight: 500; }
    .content { padding: 28px 20px 34px; }
    .page-title { font-size: 34px; font-weight: 500; color: #1d2433; margin-bottom: 12px; }
    .meta-text { font-size: 16px; color: #6d7688; margin-bottom: 24px; }
    .card {
      background: white; border: 2px solid #d7dbe5; border-radius: 24px;
      padding: 18px; box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04); margin-bottom: 16px;
    }
    .hall-name { font-size: 26px; font-weight: 500; color: #1d2433; margin-bottom: 10px; }
    .hall-meta { font-size: 15px; color: #6d7688; line-height: 1.7; }
    .section-title { font-size: 24px; font-weight: 500; margin-bottom: 8px; }
    .section-time { font-size: 15px; color: #6d7688; margin-bottom: 14px; }
    .item-row {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 12px 0; border-top: 1px solid #edf1f7;
    }
    .item-row:first-of-type { border-top: none; }
    .item-name { font-size: 17px; font-weight: 500; margin-bottom: 4px; }
    .item-meta { font-size: 14px; color: #6d7688; }
    .tag {
      padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 700;
      background: #ecfdf3; color: #15803d; border: 1px solid #b7e4c0; white-space: nowrap;
    }
    .note-box {
      margin-top: 14px; background: #f8faff; border: 2px solid #edf1f7;
      border-radius: 18px; padding: 14px;
    }
    .note-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .note-text { font-size: 14px; color: #475467; }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .btn {
      height: 60px; border-radius: 26px; font-size: 18px; font-weight: 500;
      border: none; cursor: pointer;
    }
    .secondary { background: white; color: #1d2433; border: 2px solid #d7dbe5; }
    .primary { background: #7890d8; color: white; box-shadow: 0 10px 22px rgba(120, 144, 216, 0.18); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Preview</div>
    </div>

    <div class="content">
      <div class="page-title">Preview Before Save</div>
      <div class="meta-text">Student side preview</div>

      <div class="card">
        <div class="hall-name">Shaheed Habibur Rahman Hall</div>
        <div class="hall-meta">Date: 2026-03-12<br>Preview mode before save</div>
      </div>

      <div class="card">
        <div class="section-title">Lunch</div>
        <div class="section-time">Time: 12:30 PM - 2:30 PM</div>

        <div class="item-row">
          <div>
            <div class="item-name">Briyani</div>
            <div class="item-meta">৳50 • Remaining: 100</div>
          </div>
          <div class="tag">AVAILABLE</div>
        </div>

        <div class="item-row">
          <div>
            <div class="item-name">Achar</div>
            <div class="item-meta">৳5 • Remaining: 60</div>
          </div>
          <div class="tag">LOW</div>
        </div>

        <div class="note-box">
          <div class="note-title">NOTE</div>
          <div class="note-text">Briyani, Achar</div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn secondary">Back to Edit</button>
        <button class="btn primary">Confirm Save</button>
      </div>
    </div>
  </div>
</body>
</html>
