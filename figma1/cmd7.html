<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Feast</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f4f6fb;
    }

    .header {
      background: #6f8fdb;
      color: #ffffff;
      padding: 18px 16px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 24px;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    .header-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .content {
      padding: 24px 16px 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .meta-text {
      font-size: 15px;
      color: #667085;
      margin-bottom: 28px;
    }

    .field-group {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 10px;
    }

    .input-box,
    .textarea-box {
      width: 100%;
      border: 1px solid #d0d5dd;
      border-radius: 18px;
      background: #ffffff;
      padding: 0 14px;
      font-size: 16px;
      color: #111827;
      outline: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }

    .input-box {
      height: 56px;
    }

    .textarea-box {
      min-height: 118px;
      padding-top: 14px;
      padding-bottom: 14px;
      resize: none;
    }

    .input-box::placeholder,
    .textarea-box::placeholder {
      color: #98a2b3;
    }

    .submit-btn {
      display: block;
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 20px;
      background: #6f8fdb;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      line-height: 58px;
      margin-top: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Add Feast</div>
    </div>

    <div class="content">
      <div class="page-title">Add Feast</div>
      <div class="meta-text">Hall: hb • Canteen</div>

      <div class="field-group">
        <label class="field-label">Date (YYYY-MM-DD)</label>
        <input class="input-box" type="text" value="2026-03-10" />
      </div>

      <div class="field-group">
        <label class="field-label">Title</label>
        <input class="input-box" type="text" value="Briyani Feast" />
      </div>

      <div class="field-group">
        <label class="field-label">Time Range</label>
        <input class="input-box" type="text" value="8:00 PM - 9:00 PM" />
      </div>

      <div class="field-group">
        <label class="field-label">Menu</label>
        <textarea class="textarea-box">Kacchi Briyani</textarea>
      </div>

      <a href="#" class="submit-btn">Save Feast</a>
    </div>
  </div>
</body>
</html>
