<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Reset</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f4f6fb; color: #1f2937; }
    .app { width: 100%; max-width: 390px; min-height: 100vh; margin: 0 auto; background: #f4f6fb; }
    .header {
      height: 74px; background: #7890d8; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .back-btn {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      color: white; text-decoration: none; font-size: 34px;
    }
    .header-title { color: white; font-size: 22px; font-weight: 500; }
    .content { padding: 28px 20px 34px; }
    .page-title { font-size: 34px; font-weight: 500; color: #1d2433; margin-bottom: 12px; }
    .meta-text { font-size: 16px; color: #6d7688; margin-bottom: 22px; }
    .option-card {
      background: white; border: 2px solid #d7dbe5; border-radius: 24px;
      padding: 20px; box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04); margin-bottom: 16px;
    }
    .option-title { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
    .option-text { font-size: 15px; line-height: 1.7; color: #6d7688; margin-bottom: 16px; }
    .option-btn {
      width: 100%; height: 56px; border-radius: 24px; font-size: 17px; font-weight: 500; border: none; cursor: pointer;
    }
    .primary { background: #7890d8; color: white; }
    .danger { background: #fff5f4; color: #b42318; border: 2px solid #f5b8b0; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Daily Reset</div>
    </div>

    <div class="content">
      <div class="page-title">Start New Day</div>
      <div class="meta-text">Hall: hb • Date: 2026-03-13</div>

      <div class="option-card">
        <div class="option-title">Duplicate Yesterday Menu</div>
        <div class="option-text">Copy yesterday's menu as a starting point for today.</div>
        <button class="option-btn primary">Duplicate Yesterday</button>
      </div>

      <div class="option-card">
        <div class="option-title">Clear All For Today</div>
        <div class="option-text">Remove all previous menu items and start with an empty menu.</div>
        <button class="option-btn danger">Clear Everything</button>
      </div>
    </div>
  </div>
</body>
</html>
