<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HallMenu RU</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #eef0f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .mobile-screen {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      max-height: 844px;
      background: #eef0f5;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .content {
      text-align: center;
      margin-top: -40px;
    }

    .logo-box {
      width: 110px;
      height: 110px;
      border-radius: 28px;
      background: linear-gradient(180deg, #87a5eb, #7795dc);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 24px;
      box-shadow: 0 12px 24px rgba(80, 110, 180, 0.18);
    }

    .logo-text {
      color: white;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      color: #000;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 17px;
      color: #4d4d4d;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #b8c6ec;
    }

    .dot.active {
      background: #7e9be4;
    }

    .footer {
      position: absolute;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      color: #777;
      text-align: center;
      width: 100%;
      padding: 0 20px;
    }

    @media (max-width: 420px) {
      .mobile-screen {
        max-width: 100%;
        height: 100vh;
        max-height: none;
        border-radius: 0;
      }

      .logo-box {
        width: 100px;
        height: 100px;
      }

      .logo-text {
        font-size: 30px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-screen">
    <div class="content">
      <div class="logo-box">
        <div class="logo-text">RU</div>
      </div>

      <h1 class="title">HallMenu RU</h1>
      <p class="subtitle">Daily menu • Availability • Feast</p>

      <div class="dots">
        <span class="dot active"></span>
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
    </div>

    <div class="footer">Rajshahi University • Hall Dining</div>
  </div>
</body>
</html>
