<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Canteen Menu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f4f6fb;
    }

    .header {
      height: 74px;
      background: #7890d8;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      text-decoration: none;
      font-size: 34px;
      line-height: 1;
      font-weight: 400;
    }

    .header-title {
      color: white;
      font-size: 22px;
      font-weight: 500;
    }

    .content {
      padding: 28px 20px 34px;
    }

    .page-title {
      font-size: 34px;
      line-height: 1.24;
      font-weight: 500;
      color: #1d2433;
      margin-bottom: 12px;
    }

    .meta-text {
      font-size: 16px;
      color: #6d7688;
      margin-bottom: 24px;
    }

    .meal-card {
      background: white;
      border: 2px solid #d7dbe5;
      border-radius: 26px;
      padding: 16px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
      margin-bottom: 16px;
    }

    .meal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .meal-title {
      font-size: 22px;
      font-weight: 500;
      color: #1d2433;
    }

    .add-btn {
      min-width: 128px;
      height: 44px;
      border-radius: 18px;
      border: 2px solid #cfd5e2;
      background: white;
      color: #1d2433;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 0 14px;
    }

    .item-box {
      border: 1.8px solid #e0e5ee;
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .item-box:last-child {
      margin-bottom: 0;
    }

    .name-row {
      display: grid;
      grid-template-columns: 1fr 104px;
      gap: 10px;
      margin-bottom: 12px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .input-box {
      width: 100%;
      height: 52px;
      border: 2px solid #d7dbe5;
      border-radius: 18px;
      background: white;
      padding: 0 16px;
      font-size: 18px;
      color: #1f2937;
      outline: none;
    }

    .remove-btn {
      height: 52px;
      border-radius: 18px;
      border: 2px solid #f5b8b0;
      background: #fff5f4;
      color: #dc3b2f;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-btn {
      min-width: 72px;
      height: 40px;
      border-radius: 17px;
      border: 2px solid #d7dbe5;
      background: white;
      color: #6d7688;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 0 14px;
    }

    .status-btn.active {
      border-color: #1d2433;
      color: #1d2433;
    }

    .action-stack {
      display: grid;
      gap: 14px;
      margin-top: 26px;
    }

    .preview-btn {
      width: 100%;
      height: 64px;
      border-radius: 28px;
      border: 2px solid #d7dbe5;
      background: white;
      color: #1d2433;
      font-size: 21px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
    }

    .save-btn {
      width: 100%;
      height: 64px;
      border: none;
      border-radius: 28px;
      background: #7890d8;
      color: white;
      font-size: 22px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(120, 144, 216, 0.18);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Update Canteen Menu</div>
    </div>

    <div class="content">
      <div class="page-title">Update Canteen<br>Menu (Item-wise)</div>
      <div class="meta-text">Hall: hb • Date: 2026-03-12</div>

      <div class="meal-card">
        <div class="meal-head">
          <div class="meal-title">Canteen</div>
          <a href="#" class="add-btn">+ Add item</a>
        </div>

        <div class="item-box">
          <div class="name-row">
            <input class="input-box" type="text" value="Briyani" />
            <div class="remove-btn">Remove</div>
          </div>

          <div class="two-col">
            <input class="input-box" type="text" value="50" />
            <input class="input-box" type="text" value="70" />
          </div>

          <div class="status-row">
            <a href="#" class="status-btn active">Available</a>
            <a href="#" class="status-btn">Low</a>
            <a href="#" class="status-btn">Finished</a>
          </div>
        </div>

        <div class="item-box">
          <div class="name-row">
            <input class="input-box" type="text" value="Dim" />
            <div class="remove-btn">Remove</div>
          </div>

          <div class="two-col">
            <input class="input-box" type="text" value="20" />
            <input class="input-box" type="text" value="50" />
          </div>

          <div class="status-row">
            <a href="#" class="status-btn">Available</a>
            <a href="#" class="status-btn active">Low</a>
            <a href="#" class="status-btn">Finished</a>
          </div>
        </div>
      </div>

      <div class="action-stack">
        <a href="#" class="preview-btn">Preview</a>
        <a href="#" class="save-btn">Save Canteen Menu</a>
      </div>
    </div>
  </div>
</body>
</html>
