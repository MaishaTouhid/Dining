<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderator Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f4f6fb;
    }

    .header {
      background: #6f8fdb;
      color: #ffffff;
      padding: 18px 16px 20px;
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 24px;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    .header-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .content {
      padding: 24px 16px 32px;
    }

    .hall-name {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .hall-meta {
      font-size: 15px;
      color: #667085;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .status-card {
      width: 100%;
      background: #6f8fdb;
      color: #ffffff;
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }

    .action-list {
      display: grid;
      gap: 14px;
    }

    .action-btn {
      display: block;
      width: 100%;
      background: #ffffff;
      border: 1px solid #dbe4f0;
      border-radius: 18px;
      padding: 18px 16px;
      text-align: center;
      text-decoration: none;
      color: #111827;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Dashboard</div>
    </div>

    <div class="content">
      <div class="hall-name">Shaheed Habibur Rahman Hall</div>
      <div class="hall-meta">Hall: hb • Role: Canteen Moderator</div>

      <div class="status-card">Quick Canteen Status (Item-wise)</div>

      <div class="action-list">
        <a href="update-canteen-menu.html" class="action-btn">Update Canteen Menu</a>
        <a href="post-notice.html" class="action-btn">Post Notice</a>
        <a href="add-feast.html" class="action-btn">Add Feast</a>
        <a href="home.html" class="action-btn">Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
