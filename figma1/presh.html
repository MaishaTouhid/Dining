<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hall Menu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f4f6fb;
    }

    .header {
      background: linear-gradient(180deg, #7da0ea, #6e8fdb);
      color: white;
      padding: 18px 16px 20px;
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 24px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .header-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .content {
      padding: 16px;
    }

    .hall-card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
      border: 1px solid #edf1f7;
    }

    .hall-name {
      font-size: 22px;
      font-weight: 800;
      color: #111827;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .hall-meta {
      font-size: 14px;
      line-height: 1.8;
      color: #667085;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 12px;
    }

    .menu-option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border: 1px solid #edf1f7;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
      text-decoration: none;
      color: inherit;
    }

    .menu-option-left {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .menu-option-title {
      font-size: 17px;
      font-weight: 700;
      color: #111827;
    }

    .menu-option-text {
      font-size: 14px;
      color: #667085;
      line-height: 1.5;
    }

    .arrow {
      font-size: 18px;
      color: #98a2b3;
      font-weight: 700;
    }

    .footer-note {
      margin-top: 8px;
      text-align: center;
      font-size: 13px;
      color: #98a2b3;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Today's Menu</div>
    </div>

    <div class="content">
      <div class="hall-card">
        <div class="hall-name">শহীদ হাবিবুর রহমান হল</div>
        <div class="hall-meta">
          Hall ID: hb<br>
          Date: 2026-03-12<br>
          Last updated: 3/12/2026, 2:55 AM
        </div>
      </div>

      <div class="section-title">Select Menu Type</div>

      <a href="#" class="menu-option">
        <div class="menu-option-left">
          <div class="menu-option-title">Hall Dining</div>
          <div class="menu-option-text">See breakfast, lunch, and dinner menu</div>
        </div>
        <div class="arrow">⌄</div>
      </a>

      <a href="#" class="menu-option">
        <div class="menu-option-left">
          <div class="menu-option-title">Hall Canteen</div>
          <div class="menu-option-text">See available canteen food items</div>
        </div>
        <div class="arrow">⌄</div>
      </a>

      <div class="footer-note">
        Tap any option to view menu details
      </div>
    </div>
  </div>
</body>
</html>
