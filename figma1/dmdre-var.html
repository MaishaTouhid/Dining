<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderator Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f4f6fb;
    }

    .header {
      height: 74px;
      background: #7890d8;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      text-decoration: none;
      font-size: 34px;
      line-height: 1;
      font-weight: 400;
    }

    .header-title {
      color: white;
      font-size: 22px;
      font-weight: 500;
    }

    .content {
      padding: 28px 20px 40px;
    }

    .hall-name {
      font-size: 34px;
      line-height: 1.28;
      font-weight: 500;
      color: #1d2433;
      margin-bottom: 16px;
    }

    .hall-meta {
      font-size: 16px;
      color: #6d7688;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .primary-card {
      width: 100%;
      height: 66px;
      border: none;
      border-radius: 26px;
      background: #7890d8;
      color: white;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 18px;
      box-shadow: 0 10px 22px rgba(120, 144, 216, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .action-list {
      display: grid;
      gap: 16px;
    }

    .action-btn {
      width: 100%;
      min-height: 72px;
      background: white;
      border: 2px solid #d7dbe5;
      border-radius: 26px;
      color: #1d2433;
      font-size: 18px;
      font-weight: 500;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Dashboard</div>
    </div>

    <div class="content">
      <div class="hall-name">Shaheed Habibur Rahman Hall</div>
      <div class="hall-meta">Hall: hb • Role: Dining Moderator</div>

      <a href="#" class="primary-card">Quick Status (Item-wise)</a>

      <div class="action-list">
        <a href="#" class="action-btn">Update Dining Menu</a>
        <a href="#" class="action-btn">Post Notice</a>
        <a href="#" class="action-btn">Add Feast</a>
        <a href="#" class="action-btn">Daily Reset</a>
        <a href="#" class="action-btn">Verification</a>
        <a href="#" class="action-btn">Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
