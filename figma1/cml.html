<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderator Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f4f6fb;
    }

    .header {
      background: #6f8fdb;
      color: #ffffff;
      padding: 18px 16px 20px;
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 24px;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    .header-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .content {
      padding: 24px 16px 32px;
    }

    .page-title {
      font-size: 30px;
      font-weight: 800;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .role-text {
      font-size: 15px;
      color: #667085;
      margin-bottom: 34px;
    }

    .field-group {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
    }

    .hall-options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hall-chip {
      min-width: 74px;
      height: 54px;
      border-radius: 27px;
      border: 1px solid #dbe4f0;
      background: #ffffff;
      color: #344054;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }

    .hall-chip.active {
      background: #edf4ff;
      color: #3563d8;
      border-color: #bfd2ff;
    }

    .input-box {
      width: 100%;
      height: 56px;
      border: 1px solid #dbe4f0;
      border-radius: 18px;
      background: #ffffff;
      padding: 0 16px;
      font-size: 16px;
      color: #111827;
      outline: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }

    .input-box::placeholder {
      color: #98a2b3;
    }

    .login-btn {
      display: block;
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 20px;
      background: #9ab0e3;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      line-height: 58px;
      margin-top: 28px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }

    .bottom-back {
      text-align: center;
      margin-top: 24px;
    }

    .bottom-back a {
      text-decoration: none;
      color: #344054;
      font-size: 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Moderator Login</div>
    </div>

    <div class="content">
      <div class="page-title">Canteen Moderator Login</div>
      <div class="role-text">Role locked: CANTEEN</div>

      <div class="field-group">
        <label class="field-label">Select Hall</label>
        <div class="hall-options">
          <a href="#" class="hall-chip active">HB</a>
          <a href="#" class="hall-chip">SZ</a>
          <a href="#" class="hall-chip">RG</a>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Phone</label>
        <input class="input-box" type="text" placeholder="017xxxxxxxx" />
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <input class="input-box" type="password" placeholder="****" />
      </div>

      <a href="#" class="login-btn">Login</a>

      <div class="bottom-back">
        <a href="#">← Back</a>
      </div>
    </div>
  </div>
</body>
</html>
