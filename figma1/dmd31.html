<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Menu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f4f6fb;
    }

    .header {
      background: #6f8fdb;
      color: #ffffff;
      padding: 18px 16px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 24px;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
    }

    .header-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .content {
      padding: 24px 16px 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .meta-text {
      font-size: 15px;
      color: #667085;
      margin-bottom: 18px;
    }

    .meal-card {
      background: #ffffff;
      border: 1px solid #dbe4f0;
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }

    .meal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .meal-title {
      font-size: 18px;
      font-weight: 800;
      color: #111827;
    }

    .add-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      padding: 0 14px;
      border-radius: 16px;
      border: 1px solid #d0d5dd;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .empty-text {
      font-size: 15px;
      line-height: 1.7;
      color: #667085;
    }

    .save-btn {
      display: block;
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 20px;
      background: #6f8fdb;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      line-height: 58px;
      margin-top: 6px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Update Menu</div>
    </div>

    <div class="content">
      <div class="page-title">Update Today Menu (Item-wise)</div>
      <div class="meta-text">Hall: hb • Date: 2026-03-12</div>

      <div class="meal-card">
        <div class="meal-head">
          <div class="meal-title">Breakfast</div>
          <a href="#" class="add-btn">+ Add item</a>
        </div>
        <div class="empty-text">No items yet</div>
      </div>

      <div class="meal-card">
        <div class="meal-head">
          <div class="meal-title">Lunch</div>
          <a href="#" class="add-btn">+ Add item</a>
        </div>
        <div class="empty-text">No items yet</div>
      </div>

      <div class="meal-card">
        <div class="meal-head">
          <div class="meal-title">Dinner</div>
          <a href="#" class="add-btn">+ Add item</a>
        </div>
        <div class="empty-text">No items yet</div>
      </div>

      <a href="#" class="save-btn">Save Menu</a>
    </div>
  </div>
</body>
</html>
