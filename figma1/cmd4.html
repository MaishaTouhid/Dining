<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Canteen Menu</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6fb;
color:#1f2937;
}

.app{
width:100%;
max-width:390px;
min-height:100vh;
margin:auto;
background:#f4f6fb;
}

.header{
background:#6f8fdb;
color:white;
padding:18px 16px 20px;
position:sticky;
top:0;
}

.back{
position:absolute;
left:16px;
top:14px;
font-size:22px;
color:white;
text-decoration:none;
font-weight:bold;
}

.header-title{
text-align:center;
font-size:20px;
font-weight:700;
}

.content{
padding:24px 16px 32px;
}

.title{
font-size:26px;
font-weight:800;
margin-bottom:6px;
}

.meta{
font-size:14px;
color:#667085;
margin-bottom:20px;
}

.card{
background:white;
border:1px solid #dbe4f0;
border-radius:20px;
padding:16px;
box-shadow:0 4px 14px rgba(0,0,0,0.04);
margin-bottom:18px;
}

.card-head{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.card-title{
font-size:18px;
font-weight:800;
}

.add-btn{
border:1px solid #d0d5dd;
padding:8px 14px;
border-radius:16px;
font-size:14px;
font-weight:700;
background:white;
text-decoration:none;
color:#111827;
}

.empty{
font-size:15px;
color:#667085;
padding:10px 0;
}

.save{
display:block;
width:100%;
height:56px;
background:#6f8fdb;
border-radius:20px;
text-align:center;
line-height:56px;
color:white;
font-weight:700;
font-size:18px;
text-decoration:none;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<a href="#" class="back">←</a>
<div class="header-title">Update Canteen Menu</div>
</div>

<div class="content">

<div class="title">Update Canteen Menu (Item-wise)</div>
<div class="meta">Hall: hb • Date: 2026-03-12</div>

<div class="card">

<div class="card-head">
<div class="card-title">Canteen</div>
<a href="#" class="add-btn">+ Add item</a>
</div>

<div class="empty">
No items yet
</div>

</div>

<a href="#" class="save">Save Canteen Menu</a>

</div>

</div>

</body>
</html>
