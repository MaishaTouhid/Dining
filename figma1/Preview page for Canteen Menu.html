<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canteen Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f4f6fb;
    }

    .header {
      height: 74px;
      background: #7890d8;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      text-decoration: none;
      font-size: 34px;
      line-height: 1;
      font-weight: 400;
    }

    .header-title {
      color: white;
      font-size: 22px;
      font-weight: 500;
    }

    .content {
      padding: 28px 20px 34px;
    }

    .page-title {
      font-size: 34px;
      line-height: 1.24;
      font-weight: 500;
      color: #1d2433;
      margin-bottom: 12px;
    }

    .meta-text {
      font-size: 16px;
      color: #6d7688;
      margin-bottom: 20px;
    }

    .hall-card,
    .menu-card {
      background: white;
      border: 2px solid #d7dbe5;
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
      margin-bottom: 16px;
    }

    .hall-name {
      font-size: 30px;
      line-height: 1.28;
      font-weight: 500;
      color: #1d2433;
      margin-bottom: 10px;
    }

    .hall-meta {
      font-size: 15px;
      color: #6d7688;
      line-height: 1.7;
    }

    .menu-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .menu-title {
      font-size: 24px;
      font-weight: 500;
      color: #1d2433;
      margin-bottom: 4px;
    }

    .menu-sub {
      font-size: 15px;
      color: #6d7688;
    }

    .main-badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #ecfdf3;
      color: #15803d;
      border: 1px solid #b7e4c0;
      white-space: nowrap;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-top: 1px solid #edf1f7;
    }

    .item-row:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .item-name {
      font-size: 20px;
      font-weight: 500;
      color: #1d2433;
      margin-bottom: 6px;
    }

    .item-meta {
      font-size: 15px;
      color: #6d7688;
      line-height: 1.6;
    }

    .status-badge {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .available {
      background: #ecfdf3;
      color: #15803d;
      border-color: #b7e4c0;
    }

    .low {
      background: #fff7ed;
      color: #c77700;
      border-color: #f4cb91;
    }

    .note-box {
      margin-top: 14px;
      background: #f8faff;
      border: 2px solid #edf1f7;
      border-radius: 18px;
      padding: 14px;
    }

    .note-title {
      font-size: 14px;
      font-weight: 700;
      color: #344054;
      margin-bottom: 6px;
    }

    .note-text {
      font-size: 15px;
      line-height: 1.6;
      color: #475467;
    }

    .action-stack {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .secondary-btn {
      width: 100%;
      height: 64px;
      border-radius: 28px;
      border: 2px solid #d7dbe5;
      background: white;
      color: #1d2433;
      font-size: 21px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
    }

    .primary-btn {
      width: 100%;
      height: 64px;
      border: none;
      border-radius: 28px;
      background: #7890d8;
      color: white;
      font-size: 22px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(120, 144, 216, 0.18);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <a href="#" class="back-btn">←</a>
      <div class="header-title">Preview</div>
    </div>

    <div class="content">
      <div class="page-title">Canteen Preview</div>
      <div class="meta-text">Student side preview before save</div>

      <div class="hall-card">
        <div class="hall-name">Shaheed Habibur Rahman Hall</div>
        <div class="hall-meta">
          Hall: hb<br>
          Date: 2026-03-12
        </div>
      </div>

      <div class="menu-card">
        <div class="menu-top">
          <div>
            <div class="menu-title">Hall Canteen</div>
            <div class="menu-sub">All day items</div>
          </div>
          <div class="main-badge">ACTIVE</div>
        </div>

        <div class="item-row">
          <div>
            <div class="item-name">Briyani</div>
            <div class="item-meta">৳50 • Remaining: 70</div>
          </div>
          <div class="status-badge available">AVAILABLE</div>
        </div>

        <div class="item-row">
          <div>
            <div class="item-name">Dim</div>
            <div class="item-meta">৳20 • Remaining: 50</div>
          </div>
          <div class="status-badge low">LOW</div>
        </div>

        <div class="note-box">
          <div class="note-title">NOTE</div>
          <div class="note-text">Briyani, Dim</div>
        </div>
      </div>

      <div class="action-stack">
        <a href="#" class="secondary-btn">Back to Edit</a>
        <a href="#" class="primary-btn">Confirm Save</a>
      </div>
    </div>
  </div>
</body>
</html>
