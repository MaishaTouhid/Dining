
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HallMenu RU</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      background: #f3f5f9;
      padding: 20px 16px 24px;
    }

    .header {
      background: linear-gradient(180deg, #89a4ea, #7693dd);
      border-radius: 24px;
      padding: 24px 18px;
      color: white;
      margin-bottom: 22px;
    }

    .logo {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.95;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111827;
    }

    .role-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      background: #ffffff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
      color: inherit;
    }

    .role-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #edf2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .role-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .role-desc {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
      max-width: 210px;
    }

    .arrow {
      font-size: 22px;
      color: #94a3b8;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">RU</div>
      <div class="title">HallMenu RU</div>
      <div class="subtitle">
        Check hall menu and food updates before you go.
      </div>
    </div>

    <div class="section-title">Choose Role</div>

    <a href="student.html" class="role-card">
      <div class="role-left">
        <div class="icon">🎓</div>
        <div>
          <div class="role-name">Student</div>
          <div class="role-desc">
            View today's menu and food availability of different halls.
          </div>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a href="moderator.html" class="role-card">
      <div class="role-left">
        <div class="icon">🛡️</div>
        <div>
          <div class="role-name">Moderator</div>
          <div class="role-desc">
            Update daily menu, food status, and feast information.
          </div>
        </div>
      </div>
      <div class="arrow">›</div>
    </a>

    <div class="footer">University of Rajshahi Hall Dining App</div>
  </div>
</body>
</html>
